<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武蔵野大学 | 学生ポータル</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-0">
  <div class="container">
    <span class="navbar-brand">📌 武蔵野大学</span>
    <div class="d-flex align-items-center gap-2">
      <span id="studentNameLabel" class="navbar-text text-light small me-2"></span>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm">ログアウト</button>
    </div>
  </div>
</nav>

<div class="hero-band">
  <div class="container">
    <span class="hero-eyebrow">チームを見つける</span>
    <h1 class="hero-title">仲間が見つかる<br>掲示板。</h1>
    <p class="hero-sub">気になる活動に応募するだけで、締切後に自動でチームが編成されます。</p>
  </div>
</div>

<div class="container">

  <!-- Category Tabs -->
  <div class="category-tabs mb-4" role="tablist">
    <button type="button" class="category-tab active" data-category="event">イベント</button>
    <button type="button" class="category-tab" data-category="club">部活・サークル</button>
    <button type="button" class="category-tab" data-category="seminar">ゼミ</button>
    <button type="button" class="category-tab" data-category="research">研究</button>
    <button type="button" class="category-tab" data-category="career">就職・インターンシップ</button>
  </div>

  <!-- Search + Filter Bar -->
  <div class="board-controls row g-2 mb-4 align-items-center">
    <div class="col-md-6">
      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="タイトルや説明で検索...">
    </div>
    <div class="col-md-6">
      <div class="btn-group" role="group" aria-label="Filter events">
        <button type="button" class="btn filter-btn active" data-filter="all">すべて</button>
        <button type="button" class="btn filter-btn" data-filter="open">応募受付中</button>
        <button type="button" class="btn filter-btn" data-filter="closed">締切</button>
      </div>
    </div>
  </div>

  <div id="events-list" class="row g-4 mb-5"></div>
</div>

<!-- Apply Choice Modal -->
<div class="modal fade" id="applyChoiceModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><span id="choiceEventTitle"></span> に応募</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body d-flex flex-column gap-3">
        <button type="button" id="choiceIndividualBtn" class="btn btn-outline-primary btn-lg">
          👤 個人で応募する<br><span class="small text-muted">チームは自動編成されます</span>
        </button>
        <button type="button" id="choiceTeamBtn" class="btn btn-primary btn-lg">
          👥 チームで応募する<br><span class="small">友達のユーザー名を入力します</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Team Apply Modal -->
<div class="modal fade" id="teamApplyModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="teamApplyForm">
        <div class="modal-header">
          <h5 class="modal-title"><span id="teamApplyEventTitle"></span> にチームで応募</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="teamApplyEventId">
          <p class="text-muted small">あなたを含めて <strong id="teamApplySizeLabel"></strong> 人になるように、チームメイトのユーザー名を入力してください。</p>
          <div id="teammateInputs"></div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">チームで応募する</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- AI Consult Modal -->
<div class="modal fade" id="aiConsultModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">🤖 AI相談 <span id="aiConsultContext" class="text-muted small"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="aiChatLog" class="ai-chat-log mb-3"></div>
        <form id="aiChatForm" class="d-flex gap-2">
          <input type="hidden" id="aiChatEventId">
          <input type="text" id="aiChatInput" class="form-control" placeholder="質問を入力してください..." required>
          <button type="submit" class="btn btn-primary">送信</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Floating AI button -->
<button id="floatingAiBtn" class="floating-ai-btn" type="button" title="AI相談">🤖</button>

<!-- Comments Modal -->
<div class="modal fade" id="commentsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><span id="commentsEventTitle"></span> への質問・コメント</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="commentsList" class="mb-3"></div>
        <form id="commentForm" class="d-flex gap-2">
          <input type="hidden" id="commentEventId">
          <input type="text" id="commentInput" class="form-control" placeholder="質問やコメントを入力..." required>
          <button type="submit" class="btn btn-primary">送信</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Teams Modal -->
<div class="modal fade" id="teamsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><span id="teamsEventTitle"></span> のチーム</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="teamsContainer" class="row g-3"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth-common.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
</body>
</html>

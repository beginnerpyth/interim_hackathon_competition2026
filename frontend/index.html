<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Events</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand">🎓 Campus Events</span>
    <a href="organizer.html" class="btn btn-outline-light btn-sm">Organizer Login</a>
  </div>
</nav>

<div class="container">
  <h2 class="mb-4">Upcoming Events</h2>

  <!-- Search + Filter Bar -->
  <div class="row g-2 mb-4 align-items-center">
    <div class="col-md-6">
      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search events by title or description...">
    </div>
    <div class="col-md-6">
      <div class="btn-group" role="group" aria-label="Filter events">
        <button type="button" class="btn btn-outline-primary filter-btn active" data-filter="all">All</button>
        <button type="button" class="btn btn-outline-primary filter-btn" data-filter="open">Open for applications</button>
        <button type="button" class="btn btn-outline-primary filter-btn" data-filter="closed">Closed</button>
      </div>
    </div>
  </div>

  <div id="events-list" class="row g-4"></div>
</div>

<!-- Apply Modal -->
<div class="modal fade" id="applyModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="applyForm">
        <div class="modal-header">
          <h5 class="modal-title">Apply to: <span id="applyEventTitle"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="applyEventId">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="applyName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="applyEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Grade / Year</label>
            <input type="text" class="form-control" id="applyGrade" placeholder="e.g. 1st year">
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Submit Application</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Teams Modal -->
<div class="modal fade" id="teamsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Teams for: <span id="teamsEventTitle"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="teamsContainer" class="row g-3"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
</body>
</html>

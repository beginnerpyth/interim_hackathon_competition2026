<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武蔵野大学 | 主催者ダッシュボード</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand">📌 武蔵野大学 - 主催者</span>
    <button id="logoutBtn" class="btn btn-outline-light btn-sm">ログアウト</button>
  </div>
</nav>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>掲示中の項目</h4>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createEventModal">＋ 新規作成</button>
  </div>
  <div id="organizerEventsList" class="row g-4"></div>
</div>

<!-- Create Event Modal -->
<div class="modal fade" id="createEventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="createEventForm">
        <div class="modal-header">
          <h5 class="modal-title">新規作成</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">カテゴリー</label>
            <select class="form-select" id="eventCategory" required>
              <option value="event">イベント</option>
              <option value="club">部活・サークル</option>
              <option value="seminar">ゼミ</option>
              <option value="research">研究</option>
              <option value="career">就職・インターンシップ</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">タイトル</label>
            <input type="text" class="form-control" id="eventTitle" required>
          </div>
          <div class="mb-3">
            <label class="form-label">説明</label>
            <textarea class="form-control" id="eventDescription" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">チーム人数</label>
            <input type="number" class="form-control" id="eventTeamSize" min="1" required>
          </div>
          <div class="mb-3">
            <label class="form-label">定員（参加人数の上限・任意）</label>
            <input type="number" class="form-control" id="eventMaxParticipants" min="1" placeholder="例: 24（空欄なら定員なし）">
          </div>
          <div class="mb-3">
            <label class="form-label">応募締切</label>
            <input type="datetime-local" class="form-control" id="eventDeadline">
            <div class="form-text">締切後、自動的にチームが編成されます。空欄の場合は手動で編成してください。</div>
          </div>
          <div class="mb-3">
            <label class="form-label">写真</label>
            <input type="file" class="form-control" id="eventPhoto" accept="image/*">
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">作成する</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Applications Modal -->
<div class="modal fade" id="applicationsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">応募者一覧</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <table class="table">
          <thead><tr><th>氏名</th><th>メール</th><th>学部</th><th>学年</th></tr></thead>
          <tbody id="applicationsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- AI Consult Modal (organizer) -->
<div class="modal fade" id="aiConsultModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">🤖 AI相談</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="aiChatLog" class="ai-chat-log mb-3"></div>
        <form id="aiChatForm" class="d-flex gap-2">
          <input type="text" id="aiChatInput" class="form-control" placeholder="質問を入力してください..." required>
          <button type="submit" class="btn btn-primary">送信</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Floating AI button -->
<button id="floatingAiBtn" class="floating-ai-btn" type="button" title="AI相談">🤖</button>

<!-- Comments Modal (organizer) -->
<div class="modal fade" id="orgCommentsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">質問・コメント</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="orgCommentsList" class="mb-3"></div>
        <form id="orgCommentForm" class="d-flex gap-2">
          <input type="hidden" id="orgCommentEventId">
          <input type="text" id="orgCommentInput" class="form-control" placeholder="返信を入力..." required>
          <button type="submit" class="btn btn-primary">送信</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Teams Modal (organizer view) -->
<div class="modal fade" id="orgTeamsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">編成されたチーム</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="orgTeamsContainer" class="row g-3"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth-common.js"></script>
<script src="js/config.js"></script>
<script src="js/organizer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武蔵野大学 | ログイン</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <span class="login-brand-mark">📌</span>
      <h1 class="login-university">武蔵野大学</h1>
      <p class="login-tagline">チームを見つける掲示板</p>
    </div>

    <div class="login-tabs" role="tablist">
      <button type="button" class="login-tab active" data-role="student">学生ログイン</button>
      <button type="button" class="login-tab" data-role="organizer">主催者ログイン</button>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">ユーザー名</label>
        <input type="text" id="loginUsername" class="form-control" required autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label">パスワード</label>
        <input type="password" id="loginPassword" class="form-control" required autocomplete="current-password">
      </div>
      <div id="loginError" class="login-error" style="display:none;"></div>
      <button type="submit" class="btn btn-primary w-100 login-submit">ログイン</button>
    </form>

    <p class="login-note">
      アカウントをお持ちでない場合は、担当の主催者にお問い合わせください。<br>
      このページからの新規登録はできません。
    </p>
  </div>
</div>

<script src="js/auth-common.js"></script>
<script src="js/config.js"></script>
<script src="js/login.js"></script>
</body>
</html>
